---
# ─── MongoDB PersistentVolumeClaim ──────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: quicklink
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2  # AWS EBS storage class
  resources:
    requests:
      storage: 5Gi
---
# ─── MongoDB Deployment ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: quicklink
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: quicklink
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: mongo-storage
          emptyDir: {}
---
# ─── MongoDB Service ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: quicklink
spec:
  selector:
    app: mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  clusterIP: None  # Headless service for direct pod access
