apiVersion: v1
kind: Secret
metadata:
  name: quicklink-secrets
  namespace: quicklink
type: Opaque
# Values must be base64 encoded.
# Run: echo -n 'your-value' | base64
# Example MONGO_URI for Atlas:
# echo -n 'mongodb+srv://urlshort:urlshort@cluster0.xxxxx.mongodb.net/quicklink' | base64
stringData:
  MONGO_URI: "mongodb://mongodb:27017/quicklink"
