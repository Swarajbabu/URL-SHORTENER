apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quicklink-ingress
  namespace: quicklink
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Replace with your ACM certificate ARN for HTTPS
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:YOUR_REGION:YOUR_ACCOUNT_ID:certificate/YOUR_CERT_ID"
    alb.ingress.kubernetes.io/healthcheck-path: "/health"
spec:
  rules:
    # API traffic → backend
    - host: api.quicklink.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quicklink-backend
                port:
                  number: 5000
    # Frontend traffic
    - host: quicklink.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quicklink-frontend
                port:
                  number: 80
