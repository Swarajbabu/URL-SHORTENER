apiVersion: v1
kind: ConfigMap
metadata:
  name: quicklink-config
  namespace: quicklink
data:
  PORT: "5000"
  NODE_ENV: "production"
  # Replace with your actual deployed backend URL
  BASE_URL: "https://api.quicklink.yourdomain.com"
  VITE_API_URL: "https://api.quicklink.yourdomain.com"
  VITE_SHORT_DOMAIN: "https://api.quicklink.yourdomain.com"
